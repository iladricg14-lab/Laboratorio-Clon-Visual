<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <link rel="stylesheet" href="styles_index.css">
    <link rel="stylesheet" href="	https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css">
</head>
<body>
    <!--! Navbar-->


    <!--? Sección principal-->
    <div id="carouselExampleAutoplaying" class="carousel slide" data-bs-ride="carousel">
    <div class="carousel-inner">
        <div class="carousel-item active">
        <img src="imagesCarrousel/alice.jpg" class="d-block w-100" alt="Alice in Borderland">
        <div class="carousel-caption">
            <h5>Alice in Borderland</h5>
            <p>Serie japonesa de suspenso y supervivencia.</p>
        </div>
        </div>
        <div class="carousel-item">
        <img src="imagesCarrousel/arcane.jpg" class="d-block w-100" alt="Arcane">
        <div class="carousel-caption">
            <h5>Arcane</h5>
            <p>Serie animada basada en League of Legends.</p>
        </div>
        </div>
        <div class="carousel-item">
        <img src="imagesCarrousel/dark.jpg" class="d-block w-100" alt="Dark">
        <div class="carousel-caption">
            <h5>Dark</h5>
            <p>Serie alemana sobre viajes en el tiempo.</p>
        </div>
        </div>
        <div class="carousel-item">
        <img src="imagesCarrousel/kpopdemon.jpg" class="d-block w-100" alt="K-Pop Demon Hunters">
        <div class="carousel-caption">
            <h5>K-Pop Demon Hunters</h5>
            <p>Película animada basada en la cultura coreana.</p>
        </div>
        </div>
        <div class="carousel-item">
        <img src="imagesCarrousel/strangerthings.jpg" class="d-block w-100" alt="Stranger Things">
        <div class="carousel-caption">
            <h5>Stranger Things</h5>
            <p>Serie de eventos sobrenaturales en los 80's.</p>
        </div>
        </div>
    </div>
    <button class="carousel-control-prev" type="button" data-bs-target="#carouselExampleAutoplaying" data-bs-slide="prev">
        <span class="carousel-control-prev-icon" aria-hidden="true"></span>
        <span class="visually-hidden">Previous</span>
    </button>
    <button class="carousel-control-next" type="button" data-bs-target="#carouselExampleAutoplaying" data-bs-slide="next">
        <span class="carousel-control-next-icon" aria-hidden="true"></span>
        <span class="visually-hidden">Next</span>
    </button>
    </div>
